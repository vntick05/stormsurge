services:
  postgres:
    image: postgres:16
    container_name: stormsurge-postgres
    restart: "no"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5542}:5432"
    volumes:
      - gov_rfp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: stormsurge-redis
    restart: "no"
    ports:
      - "${REDIS_PORT:-6479}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: stormsurge-minio
    restart: "no"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - gov_rfp_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 10

  minio-init:
    image: minio/mc
    container_name: stormsurge-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb -p local/${MINIO_BUCKET_RAW} || true &&
      mc mb -p local/${MINIO_BUCKET_NORMALIZED} || true &&
      mc mb -p local/${MINIO_BUCKET_PARSED} || true &&
      mc mb -p local/${MINIO_BUCKET_CHUNKS} || true &&
      mc mb -p local/${MINIO_BUCKET_OUTPUTS} || true &&
      mc mb -p local/${MINIO_BUCKET_IMPORTS} || true
      "
    restart: "no"

  qdrant:
    image: qdrant/qdrant
    container_name: stormsurge-qdrant
    restart: "no"
    ports:
      - "${QDRANT_PORT:-6433}:6333"
    volumes:
      - gov_rfp_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/bash -lc \"printf 'GET /healthz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\n\\r\\n' >/dev/tcp/127.0.0.1/6333\""]
      interval: 15s
      timeout: 10s
      retries: 10

  tika:
    image: apache/tika:3.2.3.0
    container_name: stormsurge-tika
    restart: "no"
    ports:
      - "${TIKA_PORT:-10098}:9998"
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/bash -lc \"exec 3<>/dev/tcp/127.0.0.1/9998; printf 'GET /tika HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q 'Apache Tika' <&3\""]
      interval: 15s
      timeout: 10s
      retries: 10

  document-service:
    build:
      context: /home/admin/stormsurge/services/document-service
    container_name: stormsurge-document-service
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      tika:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DOCUMENT_SERVICE_PORT: ${DOCUMENT_SERVICE_PORT:-8181}
      POSTGRES_HOST: ${DOCUMENT_SERVICE_POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${DOCUMENT_SERVICE_POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: ${DOCUMENT_SERVICE_REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${DOCUMENT_SERVICE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW}
      MINIO_BUCKET_PARSED: ${MINIO_BUCKET_PARSED}
      TIKA_BASE_URL: ${TIKA_BASE_URL:-http://tika:9998}
    ports:
      - "${DOCUMENT_SERVICE_PORT:-8181}:8081"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8181/healthz', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 10

  normalization-service:
    build:
      context: /home/admin/stormsurge/services/normalization-service
    container_name: stormsurge-normalization-service
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      document-service:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NORMALIZATION_SERVICE_PORT: ${NORMALIZATION_SERVICE_PORT:-8191}
      POSTGRES_HOST: ${DOCUMENT_SERVICE_POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${DOCUMENT_SERVICE_POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: ${DOCUMENT_SERVICE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW}
      MINIO_BUCKET_PARSED: ${MINIO_BUCKET_PARSED}
      MINIO_BUCKET_NORMALIZED: ${MINIO_BUCKET_NORMALIZED}
      NORMALIZATION_PROVIDER: ${NORMALIZATION_PROVIDER:-docling}
      PWS_LLM_BASE_URL: ${PWS_LLM_BASE_URL:-http://host.docker.internal:8355/v1}
      PWS_LLM_MODEL: ${PWS_LLM_MODEL:-openai/gpt-oss-120b}
      PWS_LLM_PROMPT_VERSION: ${PWS_LLM_PROMPT_VERSION:-pws_req_v1}
    ports:
      - "${NORMALIZATION_SERVICE_PORT:-8191}:8091"
    extra_hosts:
      - host.docker.internal=host-gateway
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/healthz', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 10

  retrieval-service:
    build:
      context: /home/admin/stormsurge/services/retrieval-service
    container_name: stormsurge-retrieval-service
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      document-service:
        condition: service_healthy
      normalization-service:
        condition: service_healthy
    environment:
      RETRIEVAL_SERVICE_PORT: ${RETRIEVAL_SERVICE_PORT:-8481}
      POSTGRES_HOST: ${DOCUMENT_SERVICE_POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${DOCUMENT_SERVICE_POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      QDRANT_URL: ${RETRIEVAL_QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${RETRIEVAL_QDRANT_COLLECTION:-stormsurge_chunks_structured}
      DOCUMENT_SERVICE_BASE_URL: ${RETRIEVAL_DOCUMENT_SERVICE_BASE_URL:-http://document-service:8181}
      NORMALIZATION_SERVICE_BASE_URL: ${RETRIEVAL_NORMALIZATION_SERVICE_BASE_URL:-http://normalization-service:8091}
      DEFAULT_DATA_ROOT: ${RETRIEVAL_DEFAULT_DATA_ROOT:-/opt/perfect-rfp/data/rfps}
      EMBEDDING_PROVIDER: ${RETRIEVAL_EMBEDDING_PROVIDER:-fastembed}
      EMBEDDING_MODEL: ${RETRIEVAL_EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDINGS_BASE_URL: ${RETRIEVAL_EMBEDDINGS_BASE_URL:-}
      EMBEDDINGS_API_KEY: ${RETRIEVAL_EMBEDDINGS_API_KEY:-}
      CHUNK_SIZE_WORDS: ${RETRIEVAL_CHUNK_SIZE_WORDS:-220}
      CHUNK_OVERLAP_WORDS: ${RETRIEVAL_CHUNK_OVERLAP_WORDS:-40}
      DEFAULT_TOP_K: ${RETRIEVAL_DEFAULT_TOP_K:-5}
    ports:
      - "${RETRIEVAL_SERVICE_PORT:-8481}:8381"
    volumes:
      - /home/admin/stormsurge/data:/opt/perfect-rfp/data:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8381/healthz', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 10

  analysis-service:
    build:
      context: /home/admin/stormsurge/services/analysis-service
    container_name: stormsurge-analysis-service
    restart: "no"
    depends_on:
      retrieval-service:
        condition: service_healthy
      normalization-service:
        condition: service_healthy
    environment:
      ANALYSIS_SERVICE_PORT: ${ANALYSIS_SERVICE_PORT:-8192}
      ANALYSIS_NORMALIZATION_SERVICE_BASE_URL: ${ANALYSIS_NORMALIZATION_SERVICE_BASE_URL:-http://normalization-service:8091}
      ANALYSIS_RETRIEVAL_SERVICE_BASE_URL: ${ANALYSIS_RETRIEVAL_SERVICE_BASE_URL:-http://retrieval-service:8381}
      ANALYSIS_LLM_BASE_URL: ${ANALYSIS_LLM_BASE_URL:-http://host.docker.internal:8460/v1}
      ANALYSIS_LLM_MODEL: ${ANALYSIS_LLM_MODEL:-}
      ANALYSIS_SUMMARY_TOP_K_PER_QUERY: ${ANALYSIS_SUMMARY_TOP_K_PER_QUERY:-6}
      ANALYSIS_SUMMARY_MAX_MATCHES: ${ANALYSIS_SUMMARY_MAX_MATCHES:-30}
      ANALYSIS_SUMMARY_TEMPERATURE: ${ANALYSIS_SUMMARY_TEMPERATURE:-0.2}
    extra_hosts:
      - host.docker.internal=host-gateway
    ports:
      - "${ANALYSIS_SERVICE_PORT:-8192}:8092"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/healthz', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 10

  pws-structuring-service:
    build:
      context: /home/admin/stormsurge/services/pws-structuring-service
    container_name: stormsurge-pws-structuring-service
    restart: "no"
    depends_on:
      normalization-service:
        condition: service_healthy
      retrieval-service:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      NORMALIZATION_SERVICE_BASE_URL: ${PWS_NORMALIZATION_SERVICE_BASE_URL:-http://normalization-service:8091}
      RETRIEVAL_SERVICE_BASE_URL: ${PWS_RETRIEVAL_SERVICE_BASE_URL:-http://retrieval-service:8381}
      API_GATEWAY_BASE_URL: ${PWS_API_GATEWAY_BASE_URL:-http://host.docker.internal:8460}
      PWS_WORKSPACE_STORAGE_DIR: /workspace-outputs
    extra_hosts:
      - host.docker.internal=host-gateway
    volumes:
      - /home/admin/stormsurge/outputs/pws-workspaces:/workspace-outputs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8193/healthz', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 10

  api:
    build:
      context: /home/admin/stormsurge/gateway
    container_name: stormsurge-api
    restart: "no"
    network_mode: host
    volumes:
      - /home/admin/stormsurge/data:/opt/perfect-rfp/data:ro
    environment:
      API_PORT: ${API_PORT:-8460}
      TRTLLM_BASE_URL: ${TRTLLM_BASE_URL:-http://127.0.0.1:8355}
      RETRIEVAL_SERVICE_BASE_URL: ${RETRIEVAL_SERVICE_BASE_URL:-http://127.0.0.1:8481}
      PROJECTS_ROOT: ${PROJECTS_ROOT:-/opt/perfect-rfp/data/rfps}
      PROJECT_CHAT_TOP_K: ${PROJECT_CHAT_TOP_K:-8}
      PROJECT_CHAT_CONTEXT_CHARS: ${PROJECT_CHAT_CONTEXT_CHARS:-900}

  open-webui:
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    container_name: stormsurge-open-webui
    restart: "no"
    depends_on:
      api:
        condition: service_started
    ports:
      - "${OPEN_WEBUI_PORT:-3100}:8080"
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      WEBUI_URL: ${WEBUI_URL:-http://localhost:3100}
      ENABLE_OPENAI_API: ${ENABLE_OPENAI_API:-True}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://host.docker.internal:8460/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-local-openwebui}
      ENABLE_OLLAMA_API: ${ENABLE_OLLAMA_API:-False}
    volumes:
      - /home/admin/stormsurge/open-webui-data:/app/backend/data

  stormsurge-studio:
    build:
      context: /home/admin/stormsurge/ui/stormsurge-studio
    container_name: stormsurge-studio
    restart: "no"
    depends_on:
      api:
        condition: service_started
      normalization-service:
        condition: service_healthy
      pws-structuring-service:
        condition: service_healthy
      retrieval-service:
        condition: service_healthy
    environment:
      PORT: 3000
      PWS_STRUCTURING_SERVICE_URL: http://pws-structuring-service:8193
    ports:
      - "${WORKBENCH_PORT:-3200}:3000"

volumes:
  gov_rfp_postgres_data:
    name: stormsurge_postgres_data
  gov_rfp_qdrant_data:
    name: stormsurge_qdrant_data
  gov_rfp_minio_data:
    name: stormsurge_minio_data
