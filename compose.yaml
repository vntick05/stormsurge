services:
  stormstudio-postgres:
    image: postgres:16
    container_name: stormstudio-postgres
    restart: unless-stopped
    networks:
      - stormstudio_local
    environment:
      POSTGRES_DB: ${STORMSTUDIO_POSTGRES_DB:-stormstudio}
      POSTGRES_USER: ${STORMSTUDIO_POSTGRES_USER:-stormstudio}
      POSTGRES_PASSWORD: ${STORMSTUDIO_POSTGRES_PASSWORD:-stormstudio}
    ports:
      - "${STORMSTUDIO_POSTGRES_PORT:-5432}:5432"
    volumes:
      - /home/admin/stormstudio-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STORMSTUDIO_POSTGRES_USER:-stormstudio} -d ${STORMSTUDIO_POSTGRES_DB:-stormstudio}"]
      interval: 15s
      timeout: 10s
      retries: 10

  stormstudio-doc-cleaner:
    build:
      context: /home/admin/stormstudio-doc-cleaner
    container_name: stormstudio-doc-cleaner
    restart: unless-stopped
    networks:
      - stormstudio_local
    environment:
      DOC_CLEANER_HOST: 0.0.0.0
      DOC_CLEANER_PORT: 8081
    ports:
      - "8081:8081"
    expose:
      - "8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/healthz', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 10

  stormstudio-uploader:
    build:
      context: /home/admin/stormstudio-uploader
    container_name: stormstudio-uploader
    restart: unless-stopped
    networks:
      - stormstudio_local
    ports:
      - "3216:3216"
    volumes:
      - /home/admin/uploads/stormstudio-assets:/home/admin/uploads/stormstudio-assets
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3216/', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 10

  stormstudio-openwebui-gateway:
    build:
      context: /home/admin/stormsurge/ui/StormStudio/services/stormstudio-openwebui-gateway
    container_name: stormstudio-openwebui-gateway
    restart: unless-stopped
    networks:
      - stormstudio_local
    environment:
      PROJECTS_ROOT: ${STORMSTUDIO_OPENWEBUI_PROJECTS_ROOT:-/stormstudio-openwebui-projects}
      UPSTREAM_BASE_URL: ${STORMSTUDIO_OPENWEBUI_UPSTREAM_URL:-http://host.docker.internal:8360}
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8361
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8361:8361"
    volumes:
      - /home/admin/stormstudio-data/openwebui-projects:/stormstudio-openwebui-projects
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8361/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10

  stormstudio-open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: stormstudio-open-webui
    restart: unless-stopped
    networks:
      - stormstudio_local
    depends_on:
      stormstudio-openwebui-gateway:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WEBUI_URL: ${WEBUI_URL:-http://localhost:${STORMSTUDIO_OPENWEBUI_PORT:-3000}}
      ENABLE_OPENAI_API: "True"
      OPENAI_API_BASE_URL: http://stormstudio-openwebui-gateway:8361/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-stormstudio-openwebui}
      ENABLE_OLLAMA_API: "False"
    ports:
      - "${STORMSTUDIO_OPENWEBUI_PORT:-3000}:8080"
    volumes:
      - /home/admin/stormstudio-data/open-webui:/app/backend/data

  stormstudio-ui:
    build:
      context: /home/admin/stormsurge/ui/StormStudio
    container_name: stormstudio-ui
    restart: unless-stopped
    networks:
      - stormstudio_local
    depends_on:
      stormstudio-postgres:
        condition: service_healthy
      stormstudio-doc-cleaner:
        condition: service_healthy
      stormstudio-uploader:
        condition: service_healthy
      stormstudio-openwebui-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3006
      HOSTNAME: 0.0.0.0
      DOC_CLEANER_URL: ${STORMSTUDIO_DOC_CLEANER_URL:-http://stormstudio-doc-cleaner:8081}
      STORMSTUDIO_INGEST_URL: ${STORMSTUDIO_INGEST_URL:-http://host.docker.internal:8090}
      STORMSTUDIO_ASSET_BASE_URL: ${STORMSTUDIO_ASSET_BASE_URL:-http://stormstudio-uploader:3216}
      STORMSTUDIO_ALLOWED_DEV_ORIGINS: ${STORMSTUDIO_ALLOWED_DEV_ORIGINS:-localhost,127.0.0.1}
      STORMSTUDIO_DATABASE_URL: ${STORMSTUDIO_DATABASE_URL:-postgres://stormstudio:stormstudio@stormstudio-postgres:5432/stormstudio}
      DATABASE_URL: ${DATABASE_URL:-postgres://stormstudio:stormstudio@stormstudio-postgres:5432/stormstudio}
      STORMSTUDIO_OPENWEBUI_PROJECTS_ROOT: ${STORMSTUDIO_OPENWEBUI_PROJECTS_ROOT:-/stormstudio-openwebui-projects}
      STORMSTUDIO_REQUIREMENTS_AGENT_URL: ${STORMSTUDIO_REQUIREMENTS_AGENT_URL:-http://stormstudio-requirements-agent:8092}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${STORMSTUDIO_PORT:-3006}:3006"
    volumes:
      - /home/admin/stormstudio-data:/home/admin/stormstudio-data
      - /home/admin/stormstudio-data/openwebui-projects:/stormstudio-openwebui-projects
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3006/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10

  stormstudio-ui-dev:
    build:
      context: /home/admin/stormsurge/ui/StormStudio
      target: dev
    container_name: stormstudio-ui-dev
    restart: unless-stopped
    networks:
      - stormstudio_local
    depends_on:
      stormstudio-postgres:
        condition: service_healthy
      stormstudio-doc-cleaner:
        condition: service_healthy
      stormstudio-uploader:
        condition: service_healthy
      stormstudio-openwebui-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3007
      HOSTNAME: 0.0.0.0
      DOC_CLEANER_URL: ${STORMSTUDIO_DOC_CLEANER_URL:-http://stormstudio-doc-cleaner:8081}
      STORMSTUDIO_INGEST_URL: ${STORMSTUDIO_INGEST_URL:-http://host.docker.internal:8090}
      STORMSTUDIO_ASSET_BASE_URL: ${STORMSTUDIO_ASSET_BASE_URL:-http://stormstudio-uploader:3216}
      STORMSTUDIO_ALLOWED_DEV_ORIGINS: ${STORMSTUDIO_ALLOWED_DEV_ORIGINS:-localhost,127.0.0.1}
      STORMSTUDIO_DATABASE_URL: ${STORMSTUDIO_DATABASE_URL:-postgres://stormstudio:stormstudio@stormstudio-postgres:5432/stormstudio}
      DATABASE_URL: ${DATABASE_URL:-postgres://stormstudio:stormstudio@stormstudio-postgres:5432/stormstudio}
      STORMSTUDIO_OPENWEBUI_PROJECTS_ROOT: ${STORMSTUDIO_OPENWEBUI_PROJECTS_ROOT:-/stormstudio-openwebui-projects}
      STORMSTUDIO_REQUIREMENTS_AGENT_URL: ${STORMSTUDIO_REQUIREMENTS_AGENT_URL:-http://stormstudio-requirements-agent:8092}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3007:3007"
    volumes:
      - /home/admin/stormsurge/ui/StormStudio:/app
      - /app/node_modules
      - /home/admin/stormstudio-data/openwebui-projects:/stormstudio-openwebui-projects
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3007/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10

networks:
  stormstudio_local:
    name: stormstudio_local
    driver: bridge
